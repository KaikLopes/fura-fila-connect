<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha | FuraFila Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <i class="fa-solid fa-staff-snake"></i>
        <h1>FuraFila<span> Connect</span></h1>
        <p>Digite seu email para receber um código de recuperação</p>
      </div>

      <div class="auth-error" id="authError" style="display: none;">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="authErrorText"></span>
      </div>

      <div class="auth-success" id="authSuccess" style="display: none;">
        <i class="fa-solid fa-check-circle"></i>
        <span id="authSuccessText"></span>
      </div>

      <form id="esqueciForm">
        <div class="form-group">
          <label for="email">Email cadastrado</label>
          <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btnEnviar">
          <i class="fa-solid fa-paper-plane"></i> Enviar Código
        </button>
      </form>

      <div class="auth-footer">
        <a href="login.html">
          <i class="fa-solid fa-arrow-left"></i> Voltar ao login
        </a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/esqueci-senha.js"></script>
</body>
</html>
